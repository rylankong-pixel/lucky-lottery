<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

        .container { max-width: 400px; margin: 50px auto; background: white; padding: 20px; border-radius: 10px; }
        .wheel { width: 200px; height: 200px; border: 3px solid #333; border-radius: 50%; margin: 20px auto; position: relative; background: conic-gradient(red 0deg 72deg, blue 72deg 144deg, green 144deg 216deg, yellow 216deg 288deg, orange 288deg 360deg); }
        .btn { background: #ff6b6b; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; }
        .result { margin-top: 20px; padding: 10px; background: #f8f9fa; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">

        <button class="btn" onclick="spin()">еҜ®вӮ¬жҝ®е¬«еЁҠжҝӮ?/button>

    <script>

        function spin() {

                btn.disabled = false;
                btn.textContent = 'йҚҗе¶ҶжҪөж¶“вӮ¬еЁҶ?;
            }, 2000);

</body>
</html>
