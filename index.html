<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Wheel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 90%; }
        h1 { color: #667eea; margin-bottom: 30px; font-size: 28px; }
        .wheel-area { position: relative; width: 280px; height: 280px; margin: 0 auto 30px; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden; transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1); border: 8px solid #2c3e50; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
        .wheel-section { position: absolute; width: 50%; height: 50%; transform-origin: right bottom; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.7); font-size: 14px; overflow: hidden; }
        .wheel-text { transform: rotate(45deg); text-align: center; width: 80px; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #e74c3c; z-index: 10; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3)); }
        .spin-btn { background: linear-gradient(45deg, #ff6b6b, #ee5a24); color: white; border: none; padding: 18px 40px; font-size: 20px; border-radius: 50px; cursor: pointer; margin: 20px 0; transition: all 0.3s; box-shadow: 0 5px 15px rgba(238, 90, 36, 0.4); }
        .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 20px rgba(238, 90, 36, 0.6); }
        .spin-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .result { margin-top: 25px; padding: 20px; background: linear-gradient(135deg, #f8f9fa, #e9ecef); border-radius: 15px; display: none; border-left: 5px solid #28a745; }
        .prize-name { font-size: 24px; color: #e74c3c; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>&#x1F389; Lucky Lottery Wheel &#x1F389;</h1>
        
        <div class="wheel-area">
            <div class="pointer"></div>
            <div class="wheel" id="wheel">
                <!-- Wheel sections will be generated by JS -->
            </div>
        </div>
        
        <button class="spin-btn" id="spinBtn" onclick="spin()">&#x1F3AF; Start Spin</button>
        
        <div class="result" id="result">
            <h3>&#x1F389; Congratulations!</h3>
            <div class="prize-name" id="prizeName"></div>
            <p>Thank you for participating!</p>
        </div>
    </div>

    <script>
        var prizes = [
            { name: "&#x1F4F1; First Prize iPhone 15", color: "#e74c3c", prob: 5 },
            { name: "&#x1F3A7; Second Prize AirPods Pro", color: "#3498db", prob: 10 },
            { name: "&#x1F4B0; Third Prize JD Card 200 Yuan", color: "#f39c12", prob: 15 },
            { name: "&#x1F50B; Fourth Prize Xiaomi Power Bank", color: "#27ae60", prob: 20 },
            { name: "&#x1F60A; Fifth Prize Thanks", color: "#9b59b6", prob: 50 }
        ];

        var isSpinning = false;

        function initWheel() {
            var wheel = document.getElementById('wheel');
            var anglePerPrize = 360 / prizes.length;
            
            wheel.innerHTML = '';
            
            for (var i = 0; i < prizes.length; i++) {
                var prize = prizes[i];
                var section = document.createElement('div');
                section.className = 'wheel-section';
                section.style.backgroundColor = prize.color;
                section.style.transform = 'rotate(' + (i * anglePerPrize) + 'deg)';
                
                var textDiv = document.createElement('div');
                textDiv.className = 'wheel-text';
                textDiv.innerHTML = prize.name.split(' ')[0];
                textDiv.style.fontSize = anglePerPrize < 60 ? '12px' : '14px';
                
                section.appendChild(textDiv);
                wheel.appendChild(section);
            }
        }

        function spin() {
            if (isSpinning) return;
            
            isSpinning = true;
            var spinBtn = document.getElementById('spinBtn');
            var result = document.getElementById('result');
            var prizeName = document.getElementById('prizeName');
            var wheel = document.getElementById('wheel');
            
            spinBtn.disabled = true;
            spinBtn.innerHTML = '&#x1F3B2; Spinning...';
            result.style.display = 'none';
            
            // Select prize by probability
            var random = Math.random() * 100;
            var cumulativeProb = 0;
            var selectedPrize = prizes[prizes.length - 1];
            
            for (var i = 0; i < prizes.length; i++) {
                var prize = prizes[i];
                cumulativeProb += prize.prob;
                if (random <= cumulativeProb) {
                    selectedPrize = prize;
                    break;
                }
            }
            
            // Calculate rotation angle
            var anglePerPrize = 360 / prizes.length;
            var targetIndex = prizes.indexOf(selectedPrize);
            var spins = 6;
            var finalAngle = spins * 360 + (360 - (targetIndex * anglePerPrize + anglePerPrize/2));
            
            // Execute spin
            wheel.style.transform = 'rotate(' + finalAngle + 'deg)';
            
            // Show result
            setTimeout(function(){
                prizeName.innerHTML = selectedPrize.name;
                result.style.display = 'block';
                spinBtn.disabled = false;
                spinBtn.innerHTML = '&#x1F3AF; Spin Again';
                isSpinning = false;
            }, 4000);
        }

        window.onload = function() {
            initWheel();
        };
    </script>
</body>
</html>
