<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lottery</title>
    <style>
        body { font-family: Arial; text-align: center; background: #f0f0f0; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: 50px auto; background: white; padding: 20px; border-radius: 10px; }
        .wheel { width: 200px; height: 200px; border: 3px solid #333; border-radius: 50%; margin: 20px auto; background: linear-gradient(0deg, red 0%, red 20%, blue 20%, blue 40%, green 40%, green 60%, yellow 60%, yellow 80%, orange 80%, orange 100%); }
        .btn { background: #ff6b6b; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; margin: 10px; }
        .result { margin-top: 20px; padding: 10px; background: #f8f9fa; border-radius: 5px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Lottery Game</h1>
        <div class="wheel"></div>
        <button class="btn" onclick="spin()">Start Spin</button>
        <div class="result" id="result">
            <h3>You got: <span id="prize"></span></h3>
        </div>
    </div>

    <script>
        var prizes = ["First Prize", "Second Prize", "Third Prize", "Fourth Prize", "Thanks"];
        
        function spin() {
            var btn = document.querySelector('.btn');
            var result = document.getElementById('result');
            var prizeSpan = document.getElementById('prize');
            
            btn.disabled = true;
            btn.textContent = 'Spinning...';
            result.style.display = 'none';
            
            setTimeout(function(){
                var random = Math.floor(Math.random() * prizes.length);
                prizeSpan.textContent = prizes[random];
                result.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Spin Again';
            }, 2000);
        }
    </script>
</body>
</html>
